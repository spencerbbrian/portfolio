version: 2

models:
  - name: metricflow_time_spine
    description: >
      Single-column calendar spine (one row per day) required by the dbt
      Semantic Layer to resolve time-based metric queries at any
      granularity. Not meant to be queried directly -- MetricFlow uses it
      internally.
    time_spine:
      standard_granularity_column: date_day
    columns:
      - name: date_day
        description: "Calendar date."
        granularity: day
        tests:
          - not_null
          - unique
