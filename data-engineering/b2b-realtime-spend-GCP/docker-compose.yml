services:
  pubsub-emulator:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    command: gcloud beta emulators pubsub start --host-port=0.0.0.0:8085 --project=local-dev-project
    ports:
      - "8085:8085"

  pubsub-init:
    image: python:3.12-slim
    depends_on:
      - pubsub-emulator
    environment:
      - PUBSUB_EMULATOR_HOST=pubsub-emulator:8085
    volumes:
      - .:/repo
    working_dir: /repo
    command: sh -c "pip install google-cloud-pubsub --quiet && python init_emulator.py"
    restart: "no"

  fake-gcs-server:
    image: fsouza/fake-gcs-server
    command: -scheme http -port 4443 -backend filesystem -filesystem-root /data
    ports:
      - "4443:4443"
    volumes:
      - ./local-gcs-data:/data

  airflow:
    image: apache/airflow:2.9.3
    depends_on:
      - pubsub-emulator
      - pubsub-init
    environment:
      - PUBSUB_EMULATOR_HOST=pubsub-emulator:8085
      - GOOGLE_CLOUD_PROJECT=portfolio-analytics-499108
      - REPO_ROOT=/opt/airflow/repo
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=admin
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - .:/opt/airflow/repo
    command: bash /opt/airflow/repo/scripts/airflow_init.sh