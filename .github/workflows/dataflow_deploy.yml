name: Dataflow Deploy

# Manual trigger only — never automatic.
# Deploying to Dataflow starts real GCP workers that cost money.
# Always cancel/drain the job after your demo.
on:
  workflow_dispatch:
    inputs:
      inject_anomalies:
        description: 'Inject anomalies into the producer'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install pipeline dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Create .env for pipeline
        run: |
          cat > .env.local << EOF
          PUBSUB_EMULATOR_HOST=
          LOCAL_PROJECT_ID=local-dev-project
          REAL_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
          TOPIC_NAME=b2b-transactions
          STORAGE_EMULATOR_HOST=
          MODEL_ARTIFACT_BUCKET=${{ secrets.MODEL_ARTIFACT_BUCKET }}
          MODEL_ARTIFACT_BUCKET_REAL=${{ secrets.MODEL_ARTIFACT_BUCKET }}
          GCP_REGION=${{ secrets.GCP_REGION }}
          GOOGLE_CLOUD_PROJECT=${{ secrets.GCP_PROJECT_ID }}
          BQ_DATASET_RAW=b2b_spend_raw
          EOF

      - name: Deploy Beam pipeline to Dataflow
        run: |
          python pipeline/beam_pipeline.py \
            --runner DataflowRunner \
            --use-real-pubsub \
            --use-real-gcs
        env:
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GCP_PROJECT_ID }}

      - name: Post deploy summary
        run: |
          echo "## 🚀 Dataflow Job Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Pipeline is now running on real Dataflow." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**⚠️ Cost reminder:** Dataflow workers cost money while running." >> $GITHUB_STEP_SUMMARY
          echo "Cancel the job when done:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "gcloud dataflow jobs list --region ${{ secrets.GCP_REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "gcloud dataflow jobs cancel JOB_ID --region ${{ secrets.GCP_REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY