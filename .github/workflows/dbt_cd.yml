name: dbt CD

on:
  push:
    branches:
      - main
    paths:
      - 'dbt/olist/**'

jobs:
  dbt-cd:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dbt/olist

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dbt-snowflake
        run: pip install dbt-snowflake

      - name: Create dbt profiles.yml
        run: |
          mkdir -p ~/.dbt
          echo "olist:" > ~/.dbt/profiles.yml
          echo "  target: prod" >> ~/.dbt/profiles.yml
          echo "  outputs:" >> ~/.dbt/profiles.yml
          echo "    prod:" >> ~/.dbt/profiles.yml
          echo "      type: snowflake" >> ~/.dbt/profiles.yml
          echo "      account: '${{ secrets.SNOWFLAKE_ACCOUNT }}'" >> ~/.dbt/profiles.yml
          echo "      user: '${{ secrets.SNOWFLAKE_USER }}'" >> ~/.dbt/profiles.yml
          echo "      password: '${{ secrets.SNOWFLAKE_PASSWORD }}'" >> ~/.dbt/profiles.yml
          echo "      role: '${{ secrets.SNOWFLAKE_ROLE }}'" >> ~/.dbt/profiles.yml
          echo "      database: OLIST_DB" >> ~/.dbt/profiles.yml
          echo "      warehouse: '${{ secrets.SNOWFLAKE_WAREHOUSE }}'" >> ~/.dbt/profiles.yml
          echo "      schema: PROD" >> ~/.dbt/profiles.yml
          echo "      threads: 4" >> ~/.dbt/profiles.yml

      - name: dbt run (prod)
        run: dbt run --target prod
